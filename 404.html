<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Page Not Found</title>
  <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:          #f0eff4;
      --bg-card:     #ffffff;
      --border:      #dddbe8;
      --dark:        #1a0533;
      --mid:         #4b3068;
      --muted:       #7a6895;
      --violet:      #7c3aed;
      --violet-mid:  #9f67ff;
      --violet-soft: #ede9fe;
      --shadow:      rgba(124,58,237,0.13);
      --radius:      14px;
      --radius-lg:   22px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    /* Background blobs */
    body::before {
      content: '';
      position: fixed; top: -120px; right: -120px;
      width: 480px; height: 480px;
      background: radial-gradient(circle, rgba(159,103,255,0.14) 0%, transparent 70%);
      border-radius: 50%; pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed; bottom: -100px; left: -100px;
      width: 380px; height: 380px;
      background: radial-gradient(circle, rgba(124,58,237,0.09) 0%, transparent 70%);
      border-radius: 50%; pointer-events: none;
    }

    .card {
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 3.5rem 3rem;
      text-align: center;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 16px 50px var(--shadow);
      position: relative;
      z-index: 1;
      animation: fadeUp .6s ease both;
    }

    /* Big 404 */
    .error-code {
      font-family: 'Clash Display', sans-serif;
      font-size: clamp(5rem, 15vw, 8rem);
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(135deg, var(--violet), var(--violet-mid));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.3rem;
      letter-spacing: -2px;
    }

    .error-title {
      font-family: 'Clash Display', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 0.8rem;
    }

    .error-desc {
      font-size: 0.93rem;
      color: var(--muted);
      line-height: 1.72;
      margin-bottom: 2.2rem;
    }

    .btn-home {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: var(--violet); color: #fff;
      padding: 0.7rem 1.6rem; border-radius: 50px;
      font-size: 0.88rem; font-weight: 600;
      text-decoration: none;
      box-shadow: 0 4px 18px var(--shadow);
      transition: background .2s, transform .15s, box-shadow .2s;
      margin-bottom: 1rem;
    }
    .btn-home:hover { background: #6d28d9; transform: translateY(-2px); box-shadow: 0 8px 28px var(--shadow); }

    .divider {
      width: 40px; height: 2px;
      background: var(--border);
      margin: 1.8rem auto;
      border-radius: 2px;
    }

    .nav-links {
      display: flex; justify-content: center;
      gap: 1.2rem; flex-wrap: wrap;
    }
    .nav-links a {
      font-size: 0.82rem; font-weight: 500;
      color: var(--muted); text-decoration: none;
      transition: color .2s;
    }
    .nav-links a:hover { color: var(--violet); }

    /* Logo at top */
    .logo {
      font-family: 'Clash Display', sans-serif;
      font-size: 1.1rem; font-weight: 700;
      color: var(--dark); margin-bottom: 2rem;
      display: block; text-decoration: none;
    }
    .logo span { color: var(--violet); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="error-code">404</div>
    <h1 class="error-title">Page Not Found</h1>
    <p class="error-desc">
      Looks like this page took a wrong turn somewhere.<br/>
      It doesn't exist — or maybe it never did.
    </p>

    <a href="https://mdalishekh.in/" class="btn-home">
      ← Back to Home
    </a>

    <div class="divider"></div>

    <div class="nav-links">
      <a href="https://mdalishekh.in/#about">About</a>
      <a href="https://mdalishekh.in/#skills">Skills</a>
      <a href="https://mdalishekh.in/#projects">Projects</a>
      <a href="https://mdalishekh.in/#contact">Contact</a>
    </div>
  </div>

</body>
</html>
